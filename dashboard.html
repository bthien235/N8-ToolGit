<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Basic Dashboard</title>
		<style>
/* General Reset */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: Arial, sans-serif;
			display: flex;
		}

		/* Sidebar */
		.sidebar {
			width: 250px;
			background-color: #2c3e50;
			color: #ecf0f1;
			height: 100vh;
			padding: 20px;
			position: fixed;
		}

		.sidebar h2 {
			margin-bottom: 30px;
		}

		.sidebar a {
			display: block;
			color: #ecf0f1;
			padding: 10px;
			text-decoration: none;
			margin-bottom: 15px;
			border-radius: 5px;
			transition: background-color 0.3s;
		}

		.sidebar a:hover {
			background-color: #34495e;
		}

		/* Main Content */
		.main-content {
			margin-left: 250px;
			padding: 20px;
			width: 100%;
		}

		/* Dashboard Header */
		.dashboard-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 30px;
		}

		.dashboard-header h1 {
			font-size: 2rem;
			color: #34495e;
		}

		/* Dashboard Cards */
		.dashboard-cards {
			display: flex;
			gap: 20px;
		}

		.card {
			background-color: #ecf0f1;
			border-radius: 10px;
			padding: 20px;
			width: 100%;
			box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
			transition: transform 0.3s;
		}

		.card:hover {
			transform: translateY(-10px);
		}

		.card h3 {
			font-size: 1.5rem;
			margin-bottom: 15px;
		}

		.card p {
			font-size: 1.1rem;
			color: #2c3e50;
		}

		/* Footer */
		.footer {
			text-align: center;
			margin-top: 50px;
			color: #7f8c8d;
		}
		</style>
	</head>
	<body>
		<div class="sidebar">
			<h2>Dashboard</h2>
			<a href="#">Dashboard</a>
			<a href="#">Reports</a>
			<a href="#">Settings</a>
			<a href="#">Logout</a>
		</div>

		<div class="main-content">
			<div class="dashboard-header">
				<h1>Welcome to your Dashboard</h1>
				<button onclick="alert('You have clicked logout!')">Logout</button>
			</div>

			<div class="dashboard-cards">
				<div class="card">
					<h3>Total Users</h3>
					<p>1,200</p>
				</div>
				<div class="card">
					<h3>Total Sales</h3>
					<p>$34,500</p>
				</div>
				<div class="card">
					<h3>Revenue</h3>
					<p>$50,000</p>
				</div>
			</div>
		</div>

		<div class="footer">
			<p>&copy; 2026 Dashboard. All rights reserved.</p>
		</div>
	</body>
</html>
